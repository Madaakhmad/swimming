name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo, pdo_mysql, gd, zip
          coverage: none

      - name: 📦 Install Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: 🔐 Create .env file
        env:
          ENV_PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          # 1. CORE CONFIG (Hardcoded based on User Request)
          echo "APP_ENV=production" > .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_NAME=KhafidSwimmingClub" >> .env
          echo "APP_KEY=base64:hjn/brjAmN4+flvaSBljbXB0sTSgJnFAF6B4NZs72O4=" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_TIMEZONE=+07:00" >> .env
          echo "APP_TIMEZONE=Asia/Jakarta" >> .env
          echo "ENCRYPTION_KEY=" >> .env
          echo "API_SECRET_KEY=" >> .env
          
          # 2. BULK EXTRAS (Safe from shell expansion)
          # Use printf to ensure $ characters and spaces are preserved correctly
          printf '%s\n' "$ENV_PROD_EXTRAS" >> .env

      - name: Sync files to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: khafidswimmingclub.com/htdocs
          timeout: 3600000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.idx/**
            **/.cursorrules
            **/.dockerignore
            **/docker/**
            **/Dockerfile
            **/tests/**
            **/node_modules/**
            **/docs/**
            **/phpunit.xml
            **/.env.example
            **/README.md
            **/CHANGELOG.md
            **/CODE_OF_CONDUCT.md
            **/CONTRIBUTING.md
            **/SECURITY.md
            **/UPGRADE.md
            **/LICENSE
            storage/logs/**
            storage/framework/views/**
            storage/framework/cache/**
            storage/app/**
            !storage/**/
